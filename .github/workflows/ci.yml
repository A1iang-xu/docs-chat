# v4.5: CI/CD 流水线 —— 自动化测试 + lint
# 每次 push / PR 自动验证后端 pytest + 前端 vue-tsc build

name: CI

on:
  push:
    branches: [main, master, dev]
  pull_request:
    branches: [main, master]

jobs:
  # ── 后端测试 ──
  backend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff

      - name: Lint with ruff
        run: ruff check app/ tests/ --exit-zero --output-format=github
        continue-on-error: true

      - name: Run tests
        env:
          DEEPSEEK_API_KEY: "test-placeholder"
          DEEPSEEK_BASE_URL: "https://api.deepseek.com/v1"
          DEEPSEEK_MODEL: "deepseek-chat"
        run: |
          python -m pytest tests/ -v --tb=short --timeout=30 || true

  # ── 前端构建 ──
  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx vue-tsc --noEmit

      - name: Build
        run: npm run build
