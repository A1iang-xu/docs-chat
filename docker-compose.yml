services:
  backend:
    build: ./backend
    container_name: docschat-backend
    ports:
      - "8000:8000"
    env_file: .env.docker
    volumes:
      - chroma_data:/app/chroma_data
      - uploads:/app/uploads
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: docschat-frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  chroma_data:
  uploads:
